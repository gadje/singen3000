# fly.toml app configuration file generated for choralsplit on 2026-03-25T00:01:40+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'choralsplit'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  # Audiveris can take several minutes on a large score
  [http_service.tls_options]
    alpn = ['h2', 'http/1.1']
  [http_service.http_options]
    idle_timeout = 1800
    response_header_timeout = 1800

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 10
    soft_limit = 5

[[vm]]
  size = 'performance-2x'
  memory = '4gb'
